<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Map Controls - Distribución</title>
    <style>
        body { margin: 0; background-color: #222; overflow: hidden; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js",
                "three/addons/": "./jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MapControls } from 'three/addons/controls/OrbitControls.js';

        let camera, controls, scene, renderer;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0x222222 );
            scene.fog = new THREE.FogExp2( 0x222222, 0.002 );

            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            document.body.appendChild( renderer.domElement );

            camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 1000 );
            camera.position.set( 0, 200, -400 );

            // Controles de Mapa
            controls = new MapControls( camera, renderer.domElement );
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 100;
            controls.maxDistance = 500;
            controls.maxPolarAngle = Math.PI / 2;

            // Luces para resaltar texturas y sombras
            const dirLight1 = new THREE.DirectionalLight( 0xffffff, 3 );
            dirLight1.position.set( 1, 1, 1 );
            scene.add( dirLight1 );

            const dirLight2 = new THREE.DirectionalLight( 0x002288, 3 );
            dirLight2.position.set( -1, -1, -1 );
            scene.add( dirLight2 );

            const ambientLight = new THREE.AmbientLight( 0x555555 );
            scene.add( ambientLight );

            // Geometría personalizada (Simulando stands/carpas en un mercado)
            const geometry = new THREE.ConeGeometry( 10, 20, 4 ); // Forma de carpa
            const material = new THREE.MeshPhongMaterial( { color: 0xffaa00, flatShading: true } );

            for ( let i = 0; i < 200; i ++ ) {
                const mesh = new THREE.Mesh( geometry, material );
                mesh.position.x = ( Math.random() - 0.5 ) * 1000;
                mesh.position.y = 10; // Elevamos a la mitad de la altura
                mesh.position.z = ( Math.random() - 0.5 ) * 1000;
                mesh.updateMatrix();
                mesh.matrixAutoUpdate = false;
                scene.add( mesh );
            }

            // Piso
            const planeGeometry = new THREE.PlaneGeometry( 2000, 2000 );
            const planeMaterial = new THREE.MeshPhongMaterial( { color: 0x333333, depthWrite: false } );
            const plane = new THREE.Mesh( planeGeometry, planeMaterial );
            plane.rotation.x = - Math.PI / 2;
            scene.add( plane );

            window.addEventListener( 'resize', onWindowResize );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            requestAnimationFrame( animate );
            controls.update(); // requerido si enableDamping = true
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
